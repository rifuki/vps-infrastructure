services:
  backend:
    build:
      context: /home/rifuki/apps/Naisu-One/naisu-backend
      dockerfile: /home/rifuki/vps-infrastructure/projects/naisu-one/naisu-backend/Dockerfile
    image: naisu-one-backend:latest
    container_name: naisu-one-backend
    restart: unless-stopped
    environment:
      - RUST_ENV=production
      - DATABASE_URL=sqlite:///app/data/naisu.db
      - AGENT_URL=http://localhost:8787
    ports:
      - "127.0.0.1:3939:3939"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3939/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  agent:
    build:
      context: /home/rifuki/apps/Naisu-One/naisu-agent
      dockerfile: /home/rifuki/vps-infrastructure/projects/naisu-one/naisu-agent/Dockerfile
    image: naisu-one-agent:latest
    container_name: naisu-one-agent
    restart: unless-stopped
    environment:
      - RUST_ENV=production
      - BACKEND_URL=http://localhost:3939
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - /home/rifuki/projects/naisu-one/data/sessions.json:/app/sessions.json
      - /home/rifuki/projects/naisu-one/data/auth-profiles.json:/app/auth-profiles.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  backend-data:
    driver: local
