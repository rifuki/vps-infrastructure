services:
  app:
    build: .
    container_name: {{PROJECT_NAME}}
    restart: unless-stopped
    ports:
      - "127.0.0.1:{{PORT}}:{{PORT}}"
    environment:
      - PORT={{PORT}}
      - RUST_ENV=production
