services:
  backend:
    image: ghcr.io/rifuki/rifuki-backend:latest
    container_name: rifuki-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9393:9393"
    env_file: .env
    environment:
      - PORT=9393
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - rifuki
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9393/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  agent:
    image: ghcr.io/rifuki/miku-agent:latest
    container_name: miku-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:3939:3939"
    environment:
      - PORT=3939
    volumes:
      - ./.env:/app/.env:ro
    networks:
      - rifuki
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3939/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sandbox:
    image: ghcr.io/rifuki/rifuki-sandbox:latest
    container_name: rifuki-sandbox
    restart: unless-stopped
    # Tidak ada port keluar — diakses backend via Docker network
    networks:
      - rifuki
    stdin_open: true
    tty: true

networks:
  rifuki:
    driver: bridge
