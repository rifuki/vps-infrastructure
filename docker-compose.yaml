services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: infra-socket-proxy
    # `always` (vs unless-stopped) restarts even on graceful exit (code 0),
    # which is what happened during the disk-full incident — the daemon
    # SIGTERM'd this container, and unless-stopped treats that as
    # "user-intended stop" and refuses to bring it back. Without socket-proxy,
    # Traefik can't discover any routes and every domain 404s.
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTAINERS: 1
    userns_mode: "host"
    networks:
      - socket-proxy

  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8081:8080" # Dashboard (localhost only, access via SSH tunnel)
    volumes:
      # - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      - ./traefik.yaml:/etc/traefik/traefik.yml:ro
    environment:
      - DOCKER_API_VERSION=1.40
    networks:
      - traefik-public
      - socket-proxy

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    userns_mode: "host"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.rifuki.dev`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    networks:
      - traefik-public

volumes:
  portainer-data:

networks:
  traefik-public:
    name: traefik-public
    driver: bridge
  socket-proxy:
    name: socket-proxy
    driver: bridge
    internal: true
