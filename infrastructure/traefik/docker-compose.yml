services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8081:8080"  # Dashboard (localhost only, akses via SSH tunnel)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
    environment:
      - DOCKER_API_VERSION=1.40
    networks:
      - traefik-public

networks:
  traefik-public:
    name: traefik-public
    driver: bridge
